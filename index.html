<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HW5 — 3D Bowling Alley</title>
    <link rel="stylesheet" href="style.css" />

    <!--
      Import map: load Three.js r160 (>= r150) and its addons (OrbitControls)
      as ES modules from a CDN. This replaces the legacy global <script> build.
    -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>

  <body>
    <!-- =====================================================================
         UI SCAFFOLDING (HTML/CSS only — no logic).
         These containers are placeholders for features built in HW06.
         ===================================================================== -->

    <!-- Future 10-frame scorecard. Cells are empty placeholders. -->
    <div id="scorecard" class="ui-overlay">
      <div class="scorecard-title">Scorecard</div>
      <table class="scorecard-table">
        <thead>
          <tr>
            <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
            <th>6</th><th>7</th><th>8</th><th>9</th><th>10</th>
          </tr>
        </thead>
        <tbody>
          <!-- Frames 1-9: two rolls each. Frame 10: three rolls. -->
          <tr class="frame-rolls">
            <td><span></span><span></span></td>
            <td><span></span><span></span></td>
            <td><span></span><span></span></td>
            <td><span></span><span></span></td>
            <td><span></span><span></span></td>
            <td><span></span><span></span></td>
            <td><span></span><span></span></td>
            <td><span></span><span></span></td>
            <td><span></span><span></span></td>
            <td class="frame-ten"><span></span><span></span><span></span></td>
          </tr>
          <tr class="frame-total">
            <td></td><td></td><td></td><td></td><td></td>
            <td></td><td></td><td></td><td></td><td></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Future controls / instructions panel. -->
    <div id="controls-panel" class="ui-overlay">
      <div class="controls-title">Controls</div>
      <ul>
        <li><kbd>O</kbd> — toggle orbit camera</li>
        <li><kbd>1</kbd> — bowler view</li>
        <li><kbd>2</kbd> — overhead view</li>
        <li><kbd>3</kbd> — pin-end view</li>
        <li><kbd>4</kbd> — side view</li>
        <li><kbd>5</kbd> — ball-rack view</li>
      </ul>
      <div class="controls-note">Aiming, power &amp; scoring arrive in HW06.</div>
    </div>

    <!-- Main scene module. -->
    <script type="module" src="src/hw5.js"></script>
  </body>
</html>
